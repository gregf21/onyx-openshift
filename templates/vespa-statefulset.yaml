{{- if .Values.vectorDB.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "onyx.fullname" . }}-vespa
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
    app.kubernetes.io/component: vespa
spec:
  serviceName: {{ include "onyx.fullname" . }}-vespa
  replicas: 1
  selector:
    matchLabels:
      {{- include "onyx.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vespa
  template:
    metadata:
      labels:
        {{- include "onyx.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: vespa
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "onyx.fullname" . }}-vespa
      securityContext:
        runAsNonRoot: true
      containers:
        - name: vespa
          image: "{{ .Values.vespa.image.repository }}:{{ .Values.vespa.image.tag }}"
          imagePullPolicy: {{ .Values.global.pullPolicy }}
          env:
            - name: VESPA_HOSTNAME
              value: "{{ include "onyx.fullname" . }}-vespa-0"
          ports:
            - name: config
              containerPort: 19071
              protocol: TCP
            - name: query
              containerPort: 8080
              protocol: TCP
            - name: feed
              containerPort: 8081
              protocol: TCP
            - name: content
              containerPort: 19050
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /state/v1/health
              port: 19071
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /state/v1/health
              port: 19071
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 10
          resources:
            {{- toYaml .Values.vespa.resources | nindent 12 }}
          volumeMounts:
            - name: vespa-storage
              mountPath: /opt/vespa/var
            - name: vespa-logs
              mountPath: /opt/vespa/logs
      volumes:
        - name: vespa-logs
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: vespa-storage
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.vespa.storage.storageClass }}
        storageClassName: {{ .Values.vespa.storage.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.vespa.storage.size }}
{{- end }}
