apiVersion: v1
kind: Service
metadata:
  name: {{ include "onyx.fullname" . }}-postgresql
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: tcp-postgresql
      port: 5432
      targetPort: tcp-postgresql
      protocol: TCP
  selector:
    {{- include "onyx.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
