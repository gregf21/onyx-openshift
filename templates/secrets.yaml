{{- if not .Values.auth.postgresql.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "onyx.pgSecretName" . }}
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.auth.postgresql.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.auth.postgresql.password | quote }}
  POSTGRES_DB: {{ .Values.auth.postgresql.database | quote }}
{{- end }}
{{- if and .Values.vectorDB.enabled (not .Values.auth.redis.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "onyx.redisSecretName" . }}
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
type: Opaque
stringData:
  REDIS_PASSWORD: {{ .Values.auth.redis.password | quote }}
{{- end }}
