{{- if gt (int .Values.inferenceModel.replicaCount) 0 }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "onyx.fullname" . }}-inference-model
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
    app.kubernetes.io/component: inference-model
spec:
  replicas: {{ .Values.inferenceModel.replicaCount }}
  selector:
    matchLabels:
      {{- include "onyx.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: inference-model
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "onyx.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: inference-model
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "onyx.podSecurityContext" . | nindent 8 }}
      containers:
        - name: model-server
          image: "{{ .Values.inferenceModel.image.repository }}:{{ .Values.inferenceModel.image.tag | default .Values.global.version }}"
          imagePullPolicy: {{ .Values.global.pullPolicy }}
          securityContext:
            {{- include "onyx.containerSecurityContext" . | nindent 12 }}
          command:
            - uvicorn
            - model_server.main:app
            - --host
            - "0.0.0.0"
            - --port
            - {{ .Values.inferenceModel.containerPort | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.inferenceModel.containerPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "onyx.fullname" . }}-env
          env:
            {{- include "onyx.backendEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.inferenceModel.resources | nindent 12 }}
          volumeMounts:
            - name: onyx-logs
              mountPath: /var/log/onyx
      volumes:
        - name: onyx-logs
          emptyDir: {}
{{- end }}
