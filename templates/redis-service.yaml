{{- if .Values.vectorDB.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "onyx.fullname" . }}-redis
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - name: tcp-redis
      port: 6379
      targetPort: tcp-redis
      protocol: TCP
  selector:
    {{- include "onyx.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
{{- end }}
