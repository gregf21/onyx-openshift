apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "onyx.fullname" . }}-nginx
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
data:
  nginx.conf: |
    worker_processes auto;
    error_log /tmp/nginx-error.log warn;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        # Temp paths writable by arbitrary UID (OpenShift)
        client_body_temp_path /tmp/client_body;
        proxy_temp_path       /tmp/proxy;
        fastcgi_temp_path     /tmp/fastcgi;
        uwsgi_temp_path       /tmp/uwsgi;
        scgi_temp_path        /tmp/scgi;

        access_log /tmp/nginx-access.log;

        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;
        sendfile      on;
        keepalive_timeout 65;

        # WebSocket upgrade map
        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        upstream api_server {
            server {{ include "onyx.fullname" . }}-api:{{ .Values.api.service.port }} fail_timeout=0;
        }

        upstream web_server {
            server {{ include "onyx.fullname" . }}-webserver:{{ .Values.webserver.service.port }} fail_timeout=0;
        }

        server {
            listen {{ .Values.nginx.containerPort }};
            server_name _;

            client_max_body_size 5G;

            # SCIM
            location ~ ^/scim(/.*)?$ {
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $host;
                proxy_set_header Host $host;
                proxy_http_version 1.1;
                proxy_buffering off;
                proxy_redirect off;
                proxy_connect_timeout {{ .Values.nginx.timeouts.connect }}s;
                proxy_send_timeout {{ .Values.nginx.timeouts.send }}s;
                proxy_read_timeout {{ .Values.nginx.timeouts.read }}s;
                proxy_pass http://api_server;
            }

            # API + OpenAPI spec
            location ~ ^/(api|openapi\.json)(/.*)?$ {
                rewrite ^/api(/.*)$ $1 break;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $host;
                proxy_set_header Host $host;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_buffering off;
                proxy_redirect off;
                proxy_connect_timeout {{ .Values.nginx.timeouts.connect }}s;
                proxy_send_timeout {{ .Values.nginx.timeouts.send }}s;
                proxy_read_timeout {{ .Values.nginx.timeouts.read }}s;
                proxy_pass http://api_server;
            }

            # Everything else -> frontend
            location / {
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_set_header X-Forwarded-Host $host;
                proxy_set_header Host $host;
                proxy_http_version 1.1;
                proxy_redirect off;
                proxy_connect_timeout {{ .Values.nginx.timeouts.connect }}s;
                proxy_send_timeout {{ .Values.nginx.timeouts.send }}s;
                proxy_read_timeout {{ .Values.nginx.timeouts.read }}s;
                proxy_pass http://web_server;
            }
        }
    }
